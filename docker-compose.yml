services:
  postgres:
    image: postgres:16-alpine
    container_name: taskforge-db
    environment:
      POSTGRES_DB: taskforge_db
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge_dev
    ports:
      - "5432:5432"
    volumes:
      - taskforge-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge -d taskforge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taskforge-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taskforge.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  taskforge-pgdata:
