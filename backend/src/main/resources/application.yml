spring:
  application:
    name: taskforge-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/taskforge_db
    username: taskforge
    password: taskforge_dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

server:
  port: 8080

logging:
  level:
    com.taskforge: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
