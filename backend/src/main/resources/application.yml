spring:
  application:
    name: taskforge-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/taskforge_db
    username: taskforge
    password: taskforge_dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

server:
  port: 8080

app:
  jwt:
    secret: a-256-bit-base64-encoded-secret-for-dev-only-change-in-prod
    access-token-expiry: 15m
    refresh-token-expiry: 7d
    idle-timeout: 30m
  auth:
    max-failed-attempts: 5
    lockout-duration: 15m

logging:
  level:
    com.taskforge: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
